<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Login — smart-nvr</title>
  <link rel="stylesheet" href="/static/app.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: #171a21; border: 1px solid #23272e; border-radius: 8px; padding: 2rem; width: 320px; }
    .login-box h1 { margin-top: 0; font-size: 1.4rem; color: #7ee2b8; }
    .login-box label { display: block; font-size: 0.85rem; color: #8892a0; margin: 0.75rem 0 0.25rem; }
    .login-box input { width: 100%; }
    .login-box button { width: 100%; margin-top: 1.25rem; padding: 0.6rem; }
    .error { color: #e27e7e; font-size: 0.85rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>smart-nvr</h1>
    <form method="post" action="/api/auth/login">
      <label>Username</label>
      <input name="username" autofocus autocomplete="username">
      <label>Password</label>
      <input name="password" type="password" autocomplete="current-password">
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
      <button class="primary" type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
