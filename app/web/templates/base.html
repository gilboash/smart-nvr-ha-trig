<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}naco-real-smart-nvr{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css?v={{ version }}">
</head>
<body>
  <header class="topbar">
    <a href="/" class="brand">naco-real-smart-nvr <span class="version">v{{ version }}</span></a>
    <nav>
      <a href="/cameras">Cameras</a>
      <a href="/events">Events</a>
      <a href="/clips">Recordings</a>
      <a href="/settings">Settings</a>
    </nav>
    {% if username %}
    <form method="post" action="/api/auth/logout" class="logout-form">
      <button type="submit" class="logout-btn">{{ username }} · logout</button>
    </form>
    {% endif %}
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer class="statusbar">
    <span id="stat-cpu">CPU —</span>
    <span id="stat-ram">RAM —</span>
    <span id="stat-gpu"></span>
    <span id="stat-device"></span>
    <span id="stat-infer"></span>
  </footer>
  <script>
    (function () {
      async function poll() {
        try {
          const r = await fetch('/api/stats');
          if (!r.ok) return;
          const s = await r.json();
          document.getElementById('stat-cpu').textContent = 'CPU ' + s.cpu_pct.toFixed(0) + '%';
          document.getElementById('stat-ram').textContent =
            'RAM ' + s.ram_used_mb + ' / ' + s.ram_total_mb + ' MB (' + s.ram_pct.toFixed(0) + '%)';
          if (s.gpu) {
            document.getElementById('stat-gpu').textContent =
              s.gpu.name + ' VRAM ' + s.gpu.vram_used_mb + ' / ' + s.gpu.vram_total_mb + ' MB';
          }
          document.getElementById('stat-device').textContent = 'device: ' + (s.device || '—');
          const infer = document.getElementById('stat-infer');
          if (s.inference_ok === true) {
            infer.textContent = 'infer ✓';
            infer.style.color = '#7ee2b8';
          } else if (s.inference_ok === false) {
            infer.textContent = 'infer STALLED (' + s.inference_age_s + 's)';
            infer.style.color = '#e27e7e';
          } else {
            infer.textContent = 'infer …';
            infer.style.color = '';
          }
        } catch (_) {}
      }
      poll();
      setInterval(poll, 5000);
    })();
  </script>
</body>
</html>
