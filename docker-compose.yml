services:
  smart-nvr:
    build: .
    image: smart-nvr-ha-trig:latest
    container_name: smart-nvr-ha-trig
    restart: unless-stopped
    ports:
      - "7070:7070"
    volumes:
      - ./data:/data
      - ./config/models:/models
      - model_cache:/root/.cache
    environment:
      SNVR_HOST: 0.0.0.0
      SNVR_PORT: "7070"
      SNVR_DB_PATH: /data/snvr.db
      SNVR_SNAPSHOT_DIR: /data/snapshots
      SNVR_MODEL_DIR: /models
      SNVR_LOG_LEVEL: INFO
      SNVR_DEVICE: "${SNVR_DEVICE:-cuda:0}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  model_cache:
